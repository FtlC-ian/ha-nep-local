name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install pytest==9.0.3 pytest-asyncio aiohttp homeassistant==2026.7.2 pytest-homeassistant-custom-component
      - run: python -m pytest -q
